<!doctype html>
<html>

<head>
  <title>Mesh Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0 maximum-scale=1.0, user-scalable=no" />
  <meta name="robots" content="noindex" />
  <link href="skeleton.css" rel="stylesheet" />
  <link href="bootstrap.min.css" rel="stylesheet" />
  <link href="style.css" rel="stylesheet" />
  <meta http-equiv="cache-control" content="max-age=0" />
  <meta http-equiv="cache-control" content="no-cache" />
  <meta http-equiv="expires" content="0" />

<body class="has-docked-nav">
  <div id="call-sign-container" class="hidden">
    <div class="login-card">
      <h3>MeshChat Login</h3>
      <form>
        <label for="call-sign">Your Call Sign</label>
        <input class="u-full-width" type="text" placeholder="Enter Call Sign" id="call-sign" />
        <input id="submit-call-sign" class="button-primary u-full-width" type="submit" value="Login" />
      </form>
    </div>
  </div>
  <div class="hidden" id="chat-container" style="width: 100vw; overflow-x: hidden;">
    <div class="navbar-spacer"></div>

    <nav class="navbar navbar-expand-xl navbar-light bg-light border-bottom mb-4 w-100">
      <div class="container align-items-center" style="min-height: 80px;">
        <a class="navbar-brand text-primary fw-bold" href="https://github.com/kn6plv/meshchat"
          style="font-size: 20px; line-height: 1;">MeshChat</a>
        <button class="navbar-toggler border-0 shadow-none px-2" type="button" data-bs-toggle="collapse"
          data-bs-target="#meshchatNav" aria-controls="meshchatNav" aria-expanded="false"
          aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse bg-light z-3 position-relative pb-3 pb-xl-0 mt-2 mt-xl-0" id="meshchatNav">
          <ul class="navbar-nav me-auto mb-0 text-uppercase align-items-xl-center mt-2 mt-xl-0"
            style="font-size: 14px; letter-spacing: 0.1rem; font-weight: 600;">
            <li class="nav-item py-1 py-xl-0" style="margin-bottom: 0;">
              <a class="nav-link active px-0 px-xl-3" href="/meshchat/">Chat</a>
            </li>
            <li class="nav-item py-1 py-xl-0" style="margin-bottom: 0;">
              <a class="nav-link px-0 px-xl-3" href="/meshchat/files.html">Files</a>
            </li>
            <li class="nav-item py-1 py-xl-0" style="margin-bottom: 0;">
              <a class="nav-link px-0 px-xl-3" href="/meshchat/status.html">Status</a>
            </li>
          </ul>
          <ul class="navbar-nav ms-auto mb-0 align-items-start align-items-xl-center">
            <li class="nav-item mt-2 mt-xl-0" style="margin-bottom: 0;">
              <a class="btn btn-outline-danger fw-bold text-uppercase px-4" href="#" id="logout"
                style="letter-spacing: 0.1rem; border-width: 2px;">Logout</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
    <div class="container">
      <!-- <div class="header-info-wrapper">
        <div class="header-info-block">
          <div id="zone"></div>
        </div>
        <div class="header-info-block">
          <div id="node"></div>
        </div>
        Hidden for JS compatibility
        <div id="callsign" style="display: none"></div>
      </div> -->

      <div class="row">
        <div class="twelve columns">
          <div id="ohsnap"></div>
        </div>
      </div>
      <div class="chat-app-wrapper">
        <div class="chat-sidebar">
          <div class="panel users-panel" id="users-panel">
            <div class="panel-header d-flex justify-content-between align-items-center">
              <span>Mesh Chat Users</span>
              <span id="users-count" class="badge bg-light text-primary rounded-pill" style="font-size: 0.8rem;"></span>
            </div>
            <div class="panel-body users-panel-body" id="users-panel-body">
              <div id="users-table" class="modern-user-list">
                <!-- User items will be rendered here by chat.js -->
              </div>
            </div>
          </div>
        </div>

        <div class="chat-main">
          <div class="panel chat-messages-panel">
            <div
              class="panel-header d-flex flex-column flex-xl-row justify-content-between align-items-xl-center gap-2 flex-wrap">
              <div class="mb-2 mb-xl-0">
                Messages
                <small id="last-update" style="font-weight: normal; opacity: 0.8"></small>
              </div>
              <div class="d-flex flex-column flex-sm-row gap-2 align-items-stretch align-items-sm-center mt-3 mt-lg-0"
                style="max-width: 480px;">
                <div class="header-pill-input">
                  <span class="pill-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor"
                      class="bi bi-search" viewBox="0 0 16 16">
                      <path
                        d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001q.044.06.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1 1 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0" />
                    </svg>
                  </span>
                  <input type="text" value="" id="search" placeholder="Search messages..." />
                </div>

                <div class="header-pill-input">
                  <span class="pill-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor"
                      class="bi bi-broadcast" viewBox="0 0 16 16">
                      <path
                        d="M3.05 3.05a7 7 0 0 0 0 9.9.5.5 0 0 1-.707.707 8 8 0 0 1 0-11.314.5.5 0 0 1 .707.707m2.122 2.122a4 4 0 0 0 0 5.656.5.5 0 1 1-.708.708 5 5 0 0 1 0-7.072.5.5 0 0 1 .708.708m5.656-.708a.5.5 0 0 1 .708 0 5 5 0 0 1 0 7.072.5.5 0 1 1-.708-.708 4 4 0 0 0 0-5.656.5.5 0 0 1 0-.708m2.122-2.12a.5.5 0 0 1 .707 0 8 8 0 0 1 0 11.313.5.5 0 0 1-.707-.707 7 7 0 0 0 0-9.9.5.5 0 0 1 0-.707zM10 8a2 2 0 1 1-4 0 2 2 0 0 1 4 0" />
                    </svg>
                  </span>
                  <select id="channels">
                    <option value="" selected>Everything</option>
                  </select>
                </div>
              </div>
            </div>
            <div class="panel-body messages-scroll-area" id="messages-scroll-area">
              <div id="message-table" class="chat-container">
                <!-- Messages will be rendered as bubbles here by messages.js -->
                <div class="loading-messages">Loading messages....</div>
              </div>
            </div>
          </div>

          <div class="panel send-message-panel" id="message-panel">
            <div class="panel-body p-0" id="message-panel-body">
              <form class="send-message-form m-0">
                <div class="composer-container">
                  <textarea maxlength="1000" placeholder="Type a message (Enter to send, Shift+Enter for new line)"
                    id="message"></textarea>

                  <div class="composer-actions">
                    <div class="header-pill-input composer-pill" style="max-width: 200px;">
                      <span class="pill-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor"
                          class="bi bi-broadcast" viewBox="0 0 16 16">
                          <path
                            d="M3.05 3.05a7 7 0 0 0 0 9.9.5.5 0 0 1-.707.707 8 8 0 0 1 0-11.314.5.5 0 0 1 .707.707m2.122 2.122a4 4 0 0 0 0 5.656.5.5 0 1 1-.708.708 5 5 0 0 1 0-7.072.5.5 0 0 1 .708.708m5.656-.708a.5.5 0 0 1 .708 0 5 5 0 0 1 0 7.072.5.5 0 1 1-.708-.708 4 4 0 0 0 0-5.656.5.5 0 0 1 0-.708m2.122-2.12a.5.5 0 0 1 .707 0 8 8 0 0 1 0 11.313.5.5 0 0 1-.707-.707 7 7 0 0 0 0-9.9.5.5 0 0 1 0-.707zM10 8a2 2 0 1 1-4 0 2 2 0 0 1 4 0" />
                        </svg>
                      </span>
                      <select id="send-channel">
                        <option value="">Everything</option>
                      </select>
                      <input type="text" value="" id="new-channel" placeholder="New channel" class="hidden" />
                    </div>

                    <button id="submit-message" class="composer-send-btn" title="Send (Enter)">
                      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor"
                        class="bi bi-send-fill" viewBox="0 0 16 16">
                        <path
                          d="M15.964.686a.5.5 0 0 0-.65-.65L.767 5.855H.766l-.452.18a.5.5 0 0 0-.082.887l.41.26.001.002 4.995 3.178 3.178 4.995.002.001.26.41a.5.5 0 0 0 .886-.083zm-1.833 1.89L6.637 10.07l-.215-.338a.5.5 0 0 0-.154-.154l-.338-.215 7.494-7.494 1.178-.471z" />
                      </svg>
                    </button>
                  </div>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
      <div class="row">
        <div class="twelve columns center">
          <div id="copyright">
            Mesh Chat Copyright &copy;
            <a href="http://www.trevorsbench.com"> Trevor Paskett - K7FPV</a>
            Remix by
            <a href="https://github.com/kn6plv/meshchat"> KN6PLV </a>
            and
            <a href="https://github.com/uguraltinsoy/meshchat"> TA2DMX</a>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="bootstrap.bundle.min.js"></script>
  <script src="jquery-2.2.0.min.js"></script>
  <script src="sweetalert2.all.min.js"></script>
  <script src="js.cookie.js"></script>
  <script src="md5.js"></script>
  <script src="shared.js"></script>
  <script src="messages.js"></script>
  <script src="chat.js"></script>
</body>

</html>
