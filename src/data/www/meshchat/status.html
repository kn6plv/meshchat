                        </li>
                    </ul>
                    <ul class="navbar-nav ms-auto mb-0 align-items-start align-items-xl-center">
                        <li class="nav-item mt-2 mt-xl-0" style="margin-bottom: 0;">
                            <a class="btn btn-outline-danger fw-bold text-uppercase px-4" href="#" id="logout"
                                style="letter-spacing: 0.1rem; border-width: 2px;">Logout</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>

        <div class="container">
            <div class="row">
                <div class="twelve columns">
                    <div class="panel">
                        <div class="panel-header">
                            System Information
                        </div>
                        <div class="panel-body p-4">
                            <div class="row text-center">
                                <div class="col-md-4 mb-3 mb-md-0">
                                    <div class="fw-bold text-muted small text-uppercase mb-1">Mesh Chat</div>
                                    <div id="version" class="h5 mb-0 fw-bold text-primary"></div>
                                </div>
                                <div class="col-md-4 mb-3 mb-md-0 border-start border-end">
                                    <div class="fw-bold text-muted small text-uppercase mb-1">Zone</div>
                                    <div id="zone" class="h5 mb-0 fw-bold"></div>
                                </div>
                                <div class="col-md-4">
                                    <div class="fw-bold text-muted small text-uppercase mb-1">Node</div>
                                    <div id="node" class="h5 mb-0 fw-bold"></div>
                                </div>
                            </div>
                            <hr class="my-4">
                            <div class="row text-center">
                                <div class="col-md-6 mb-3 mb-md-0">
                                    <div class="fw-bold text-muted small text-uppercase mb-1">Callsign</div>
                                    <div id="callsign" class="h5 mb-0 fw-bold text-success"></div>
                                </div>
                                <div class="col-md-6">
                                    <div class="fw-bold text-muted small text-uppercase mb-1">Last Update</div>
                                    <div id="last-update" class="h5 mb-0 fw-bold">
                                        <span class="text-muted small">Updated:</span> <span class="time-value">0 secs
                                            ago</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="twelve columns">
                    <div class="panel">
                        <div class="panel-header d-flex justify-content-between align-items-center">
                            <span>Node Sync Status</span>
                            <span id="sync-count" class="badge bg-light text-primary rounded-pill"
                                style="font-size: 0.8rem;">0</span>
                        </div>
                        <div class="panel-body">
                            <table class="u-full-width">
                                <thead>
                                    <tr>
                                        <th>Node</th>
                                        <th>Last Sync</th>
                                    </tr>
                                </thead>
                                <tbody id="sync-table">
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
