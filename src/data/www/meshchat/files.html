<!doctype html>
<html>

<head>
    <title>Mesh Chat - Files</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0 maximum-scale=1.0, user-scalable=no" />
    <meta name="robots" content="noindex" />
    <link href="skeleton.css" rel="stylesheet" />
    <link href="bootstrap.min.css" rel="stylesheet" />
    <link href="style.css" rel="stylesheet" />
    <meta http-equiv="cache-control" content="max-age=0" />
    <meta http-equiv="cache-control" content="no-cache" />
    <meta http-equiv="expires" content="0" />
    <meta http-equiv="expires" content="Tue, 01 Jan 1980 1:00:00 GMT" />
    <meta http-equiv="pragma" content="no-cache" />
</head>

<body class="has-docked-nav">
    <div id="chat-container">
        <div class="navbar-spacer"></div>

        <nav class="navbar navbar-expand-xl navbar-light bg-light border-bottom mb-4 w-100">
            <div class="container align-items-center" style="min-height: 80px;">
                <a class="navbar-brand text-primary fw-bold" href="https://github.com/kn6plv/meshchat"
                    style="font-size: 20px; line-height: 1;">MeshChat
                    <small id="last-update"
                        style="font-weight: normal; opacity: 0.8; font-size: 11px; margin-left: 10px;"></small>
                </a>
                <button class="navbar-toggler border-0 shadow-none px-2" type="button" data-bs-toggle="collapse"
                    data-bs-target="#meshchatNav" aria-controls="meshchatNav" aria-expanded="false"
                    aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse bg-light z-3 position-relative pb-3 pb-xl-0 mt-2 mt-xl-0"
                    id="meshchatNav">
                    <ul class="navbar-nav me-auto mb-0 text-uppercase align-items-xl-center mt-2 mt-xl-0"
                        style="font-size: 14px; letter-spacing: 0.1rem; font-weight: 600;">
                        <li class="nav-item py-1 py-xl-0" style="margin-bottom: 0;">
                            <a class="nav-link px-0 px-xl-3" href="/meshchat/">Chat</a>
                        </li>
                        <li class="nav-item py-1 py-xl-0" style="margin-bottom: 0;">
                            <a class="nav-link active px-0 px-xl-3" href="/meshchat/files.html">Files</a>
                        </li>
                        <li class="nav-item py-1 py-xl-0" style="margin-bottom: 0;">
                            <a class="nav-link px-0 px-xl-3" href="/meshchat/status.html">Status</a>
                        </li>
                    </ul>
                    <ul class="navbar-nav ms-auto mb-0 align-items-start align-items-xl-center">
                        <li class="nav-item mt-2 mt-xl-0" style="margin-bottom: 0;">
                            <a class="btn btn-outline-danger fw-bold text-uppercase px-4" href="#" id="logout"
                                style="letter-spacing: 0.1rem; border-width: 2px;">Logout</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>

        <div class="container">
            <div class="row">
                <div class="twelve columns">
                    <div id="ohsnap"></div>
                </div>
            </div>

            <div class="row">
                <div class="six columns">
                    <div class="panel">
                        <div class="panel-header">
                            Upload a File
                        </div>
                        <div class="panel-body file-panel">
                            <form method="post" action="/cgi-bin/meshchat?action=upload_file" id="upload-form"
                                enctype="multipart/form-data">
                                <div id="drop-zone" class="upload-drop-zone">
                                    <div class="drop-zone-content">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40"
                                            fill="currentColor" class="bi bi-cloud-arrow-up" viewBox="0 0 16 16">
                                            <path fill-rule="evenodd"
                                                d="M7.646 5.146a.5.5 0 0 1 .708 0l2 2a.5.5 0 0 1-.708.708L8.5 6.707V10.5a.5.5 0 0 1-1 0V6.707L6.354 7.854a.5.5 0 1 1-.708-.708z" />
                                            <path
                                                d="M4.406 3.342A5.53 5.53 0 0 1 8 2c2.69 0 4.923 2 5.166 4.579C14.758 6.804 16 8.137 16 9.773 16 11.569 14.502 13 12.687 13H3.781C1.708 13 0 11.366 0 9.318c0-1.763 1.266-3.223 2.942-3.593.143-.863.698-1.723 1.464-2.383m.653.757c-.757.653-1.153 1.44-1.153 2.056v.448l-.445.049C2.064 6.805 1 7.952 1 9.318 1 10.785 2.23 12 3.781 12h8.906C13.98 12 15 10.988 15 9.773c0-1.216-1.02-2.228-2.313-2.228h-.5v-.5C12.188 4.825 10.328 3 8 3a4.53 4.53 0 0 0-2.941 1.1z" />
                                        </svg>
                                        <p>Drag & Drop file here or <span>Browse</span></p>
                                        <small id="selected-file-name">Maximum size: 10MB</small>
                                    </div>
                                    <input type="file" name="uploadfile" id="upload-file" style="display: none;">
                                </div>
                                <progress class="hidden" style="width: 100%; margin-top: 10px;"></progress>
                                <div class="mt-3 text-center">
                                    <button id="upload-button" class="btn btn-primary px-5 py-2 fw-bold" type="submit">
                                        Start Upload
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
                <div class="six columns">
                    <div class="panel">
                        <div class="panel-header">
                            File System
                        </div>
                        <div class="panel-body file-panel">
                            <div class="" id="total-bytes"></div>
                            <div class="" id="free-bytes"></div>

                            <br />
                            <button id="download-messages" class="btn btn-primary fw-bold py-2">
                                Download Messages
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="twelve columns">
                    <div class="panel">
                        <div class="panel-header d-flex justify-content-between align-items-center">
                            <span>Files Available</span>
                            <span id="files-count" class="badge bg-light text-primary rounded-pill"
                                style="font-size: 0.8rem;">0 Files</span>
                        </div>
                        <div class="panel-body">
                            <table class="u-full-width" id="files-parent-table">
                                <thead>
                                    <tr>
                                        <th>File</th>
                                        <th>Size</th>
                                        <th class="col_node">Node</th>
                                        <th class="col_time">Time</th>
                                        <th class="col_delete"></th>
                                    </tr>
                                </thead>
                                <tbody id="files-table">
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="twelve columns center">
                    <div id="copyright">
                        Mesh Chat Copyright &copy;
                        <a href="http://www.trevorsbench.com"> Trevor Paskett - K7FPV</a>
                        Remix by
                        <a href="https://github.com/kn6plv/meshchat"> KN6PLV </a>
                        and
                        <a href="https://github.com/uguraltinsoy/meshchat"> TA2DMX</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="bootstrap.bundle.min.js"></script>
    <script src="jquery-2.2.0.min.js"></script>
    <script src="ohsnap.js"></script>
    <script src="js.cookie.js"></script>
    <script src="numeral.min.js"></script>
    <script src="shared.js"></script>
    <script src="files.js"></script>
</body>

</html>
